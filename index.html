<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文本工具箱</title>

<!-- 高亮样式 -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/dracula.min.css">

<!-- 毛玻璃 + 赛博朋克风 UI -->
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    height:100vh;overflow:hidden;color:#fff;background:#111;
}
body::before{
    content:"";
    position:fixed;top:0;left:0;width:100%;height:100%;
    background-size:cover;background-position:center;
    filter:blur(12px) brightness(0.6);
    z-index:-1;
}
header{
    height:60px;background:rgba(0,0,0,0.6);
    display:flex;align-items:center;padding:0 20px;
    font-size:22px;font-weight:bold;border-bottom:1px solid #444;
}
.container{display:flex;height:calc(100vh - 60px);}
.sidebar{
    width:200px;background:rgba(0,0,0,0.6);
    border-right:1px solid #444;padding:15px;overflow-y:auto;
}
.sidebar button{
    width:100%;padding:12px;margin-bottom:10px;
    background:#222;border:none;color:white;
    cursor:pointer;border-radius:8px;transition:.3s;
}
.sidebar button:hover{background:#3b82f6;}
.main{flex:1;padding:20px;overflow:auto;}
.panel{display:none;height:100%;}
.panel.active{display:block;}
textarea,input{
    width:100%;padding:12px;margin:10px 0;
    background:#1a1a1a;color:white;border:1px solid #333;
    border-radius:8px;font-size:14px;resize:vertical;
}
button.action{
    padding:10px 20px;background:#3b82f6;color:white;border:none;border-radius:8px;cursor:pointer;margin-top:5px;
}
.preview,.result{
    margin-top:15px;background:rgba(0,0,0,0.5);padding:15px;border-radius:10px;overflow:auto;
    max-height:400px;
}
pre{border-radius:10px;padding:15px;overflow:auto;}
.markdown-body h1,h2,h3{margin:10px 0;}
.markdown-body p{margin:8px 0;line-height:1.6;}
.markdown-body code{background:#222;padding:2px 6px;border-radius:5px;}
.markdown-body blockquote{border-left:4px solid #3b82f6;padding-left:10px;margin:10px 0;color:#ccc;}
</style>
</head>
<body>
<header>🚀 精简文本工具箱</header>
<div class="container">
<div class="sidebar">
<button onclick="showPanel('md')">Markdown预览</button>
<button onclick="showPanel('json')">JSON格式化</button>
<button onclick="showPanel('regex')">正则测试</button>
<button onclick="showPanel('code')">代码高亮</button>
</div>
<div class="main">

<!-- Markdown -->
<div id="md" class="panel active">
<h2>Markdown预览</h2>
<textarea id="mdInput"># Hello Markdown
这是 **Markdown** 预览。</textarea>
<div id="mdPreview" class="preview markdown-body"></div>
</div>

<!-- JSON -->
<div id="json" class="panel">
<h2>JSON格式化/压缩</h2>
<textarea id="jsonInput">{"name":"ChatGPT","type":"AI"}</textarea>
<button class="action" onclick="formatJson()">格式化</button>
<button class="action" onclick="compressJson()">压缩</button>
<div id="jsonResult" class="result"></div>
</div>

<!-- Regex -->
<div id="regex" class="panel">
<h2>正则测试</h2>
<input id="regexPattern" placeholder="正则表达式">
<textarea id="regexText">请输入测试文本</textarea>
<button class="action" onclick="testRegex()">匹配</button>
<div id="regexResult" class="result"></div>
</div>

<!-- Code Highlight -->
<div id="code" class="panel">
<h2>代码高亮</h2>
<input id="language" placeholder="语言(js/html/css/json)">
<textarea id="codeInput">console.log("Hello");</textarea>
<button class="action" onclick="highlightCode()">高亮</button>
<div class="preview"><pre><code id="highlightResult"></code></pre></div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>
// 切换面板
function showPanel(id){
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// Markdown 渲染
const mdInput=document.getElementById("mdInput");
function renderMarkdown(){
    document.getElementById("mdPreview").innerHTML=marked.parse(mdInput.value);
    document.querySelectorAll("pre code").forEach(el=>hljs.highlightElement(el));
}
mdInput.addEventListener("input",renderMarkdown);
renderMarkdown();

// JSON 格式化
function formatJson(){
    try{
        const obj=JSON.parse(document.getElementById("jsonInput").value);
        document.getElementById("jsonResult").textContent=JSON.stringify(obj,null,4);
    }catch(e){
        document.getElementById("jsonResult").textContent="JSON格式错误";
    }
}
function compressJson(){
    try{
        const obj=JSON.parse(document.getElementById("jsonInput").value);
        document.getElementById("jsonResult").textContent=JSON.stringify(obj);
    }catch(e){
        document.getElementById("jsonResult").textContent="JSON格式错误";
    }
}

// Regex 测试
function testRegex(){
    const pattern=document.getElementById("regexPattern").value;
    const text=document.getElementById("regexText").value;
    try{
        const reg=new RegExp(pattern,"g");
        const matches=text.match(reg);
        document.getElementById("regexResult").textContent=matches? matches.join("\n"):"无匹配结果";
    }catch(e){
        document.getElementById("regexResult").textContent="正则表达式错误";
    }
}

// 代码高亮
function highlightCode(){
    const code=document.getElementById("codeInput").value;
    const lang=document.getElementById("language").value || "javascript";
    const el=document.getElementById("highlightResult");
    el.className=lang;
    el.textContent=code;
    hljs.highlightElement(el);
}
highlightCode();

// Bing 每日壁纸
fetch("https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1")
.then(r=>r.json())
.then(d=>{
    const url="https://www.bing.com"+d.images[0].url;
    document.body.style.setProperty('--bg-url',`url(${url})`);
    document.body.querySelector('::before');
    document.body.style.backgroundImage=`url(${url})`;
});
</script>
</body>
</html>
